allowBuilds:
  vue-demi: true
  esbuild: true
  sharp: true

minimumReleaseAgeExclude:
  - '@eslint/plugin-kit@0.7.2'
  - '@vue/language-core@3.3.3'
  - eslint@10.4.1
  - vue-tsc@3.3.3

overrides:
  picomatch: ">=4.0.4"
  minimatch: ">=10.2.3"
  rollup: ">=4.59.0"
  flatted: ">=3.4.2"
  vue-eslint-parser: "10.4.0"
  defu: ">=6.1.5"
  lodash: ">=4.18.0"
  lodash-es: ">=4.18.0"
  follow-redirects: ">=1.16.0"
  postcss: ">=8.5.10"
